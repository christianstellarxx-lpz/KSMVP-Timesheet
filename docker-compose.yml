# One-command Postgres for local development.
#   docker compose up -d
# Then run:  npm run setup   (generate + migrate + seed)
services:
  db:
    image: postgres:16-alpine
    container_name: ksmvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ksmvp
      POSTGRES_PASSWORD: ksmvp
      POSTGRES_DB: ksmvp
    ports:
      - "5432:5432"
    volumes:
      - ksmvp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ksmvp -d ksmvp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ksmvp_pgdata:
